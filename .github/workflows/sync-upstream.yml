name: Sync Fork with Upstream

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/RightNow-AI/openfang.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Commits behind upstream: $BEHIND"

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "Merge successful"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            echo "Merge conflict detected"
          fi

      - name: Push merged changes
        if: steps.merge.outputs.result == 'success'
        run: git push origin main

      - name: Open issue on conflict
        if: steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync',
            });
            if (existing.data.length > 0) {
              console.log('Conflict issue already open, skipping.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream sync failed — merge conflict',
              body: [
                'The automated sync with `RightNow-AI/openfang` failed due to merge conflicts.',
                '',
                '**To resolve manually:**',
                '```bash',
                'git fetch upstream',
                'git checkout main',
                'git merge upstream/main',
                '# fix conflicts, then:',
                'git add .',
                'git commit',
                'git push origin main',
                '```',
                '',
                `Commits behind upstream: ${{ steps.check.outputs.behind }}`,
                '',
                '_This issue was created automatically by the sync workflow._',
              ].join('
'),
              labels: ['upstream-sync'],
            });

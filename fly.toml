# Cronam — AI Digital Workforce Platform
# https://cronam.com
app = "cronam"
primary_region = "dfw"
kill_signal = "SIGINT"
kill_timeout = 10

[build]
  dockerfile = "Dockerfile"

[env]
  OPENFANG_LISTEN = "0.0.0.0:4200"
  OPENFANG_HOME = "/data"
  RUST_LOG = "info,openfang=info"

[http_service]
  internal_port = 4200
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[mounts]
  source = "cronam_data"
  destination = "/data"
